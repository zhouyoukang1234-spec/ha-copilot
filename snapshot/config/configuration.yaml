# 合并所有sensor配置
sensor:
  # 时间传感器（可用于自动化）
  - platform: time_date
    display_options:
      - 'time'
      - 'date'
      - 'date_time'
  # 和风天气: 已迁移到 UI 集成 (设置 → 设备与服务 → 添加集成)
  # OpenHardwareMonitor
  - platform: openhardwaremonitor
    host: 192.168.31.141
    port: 8085
  # 系统监控: systemmonitor 在新版 HA 已迁移为 UI 集成(配置 → 设备与服务),不再支持 YAML 平台。已停用 YAML 块。
  
  # ==================== Riemann积分传感器 - 将功率转换为能耗 ====================
  - platform: integration
    source: sensor.sonoff_10022cf70f_power
    name: "俊伟床插头能耗"
    unique_id: "sonoff_10022cf70f_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_10022cf6a2_power
    name: "友康床插头能耗"
    unique_id: "sonoff_10022cf6a2_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_10022cf570_power
    name: "中央2号插头能耗"
    unique_id: "sonoff_10022cf570_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_10022de30e_power
    name: "中央3号插头能耗"
    unique_id: "sonoff_10022de30e_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_10022cf71d_power
    name: "中央5号插头能耗"
    unique_id: "sonoff_10022cf71d_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_10022cfc76_power
    name: "中央1号插头能耗"
    unique_id: "sonoff_10022cfc76_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_10022ddc35_power
    name: "Sonoff 1号能耗"
    unique_id: "sonoff_10022ddc35_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_10022de63b_power
    name: "Sonoff 2号能耗"
    unique_id: "sonoff_10022de63b_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_100235142b_power
    name: "Sonoff 3号能耗"
    unique_id: "sonoff_100235142b_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_10022dede9_power
    name: "加湿器能耗"
    unique_id: "sonoff_10022dede9_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.sonoff_total_power_usage
    name: "Sonoff总能耗"
    unique_id: "sonoff_total_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  # ==================== 户外电源Integration传感器 ====================
  - platform: integration
    source: sensor.de_2dian_yuan_total_in_power
    name: "户外电源输入能耗"
    unique_id: "outdoor_power_total_in_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.de_2dian_yuan_ac_out_power
    name: "户外电源AC输出能耗"
    unique_id: "outdoor_power_ac_out_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.de_2dian_yuan_ac_in_power
    name: "户外电源AC输入能耗"
    unique_id: "outdoor_power_ac_in_energy"
    unit_prefix: k
