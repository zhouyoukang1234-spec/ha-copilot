    source: sensor.de_2dian_yuan_type_c_2_out_power
    name: "户外电源Type-C2输出能耗"
    unique_id: "outdoor_power_type_c2_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.de_2dian_yuan_usb_1_out_power
    name: "户外电源USB1输出能耗"
    unique_id: "outdoor_power_usb1_energy"
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.de_2dian_yuan_usb_2_out_power
