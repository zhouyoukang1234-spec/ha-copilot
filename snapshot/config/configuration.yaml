# ==================== 娱乐页面Helper (自动添加) ====================
input_number:
  all_speakers_volume:
    name: 所有音箱音量
    min: 0
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:volume-high
    initial: 50

input_text:
  unified_speaker_command:
    name: 统一音箱命令
    max: 200
    icon: mdi:microphone
    initial: ""
  
  # 双音响语音命令
  dual_speakers_command:
    name: 双音响语音命令
    max: 200
    icon: mdi:microphone-message
    initial: ""

# ==================== 通知中心Helper (自动添加) ====================
input_boolean:
  notify_automation_complete:
    name: 自动化完成通知
    icon: mdi:bell-check
    initial: true
  notify_device_offline:
    name: 设备离线通知
    icon: mdi:bell-alert
    initial: true
  notify_high_power:
    name: 高功率通知
    icon: mdi:bell-ring
    initial: true
  notify_low_battery:
    name: 低电量通知
    icon: mdi:battery-alert
    initial: true
  
  # 音箱统一播放控制（改进版）
  unified_speaker_play:
    name: 统一播放
    icon: mdi:play
    initial: false
  
  unified_speaker_pause:
    name: 统一暂停
    icon: mdi:pause
    initial: false
  
  unified_speaker_next:
    name: 统一下一首
    icon: mdi:skip-next
    initial: false
  
  unified_speaker_previous:
    name: 统一上一首
    icon: mdi:skip-previous
    initial: false

