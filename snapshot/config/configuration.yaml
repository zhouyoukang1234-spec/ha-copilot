# ==================== Powercalc 用电量计算配置 ====================
# 为没有功率传感器的设备创建虚拟功率和能耗传感器
powercalc:
  power_sensor_precision: 2
  energy_sensor_precision: 4
  
  sensors:
    # WiFi插座（没有power传感器的设备）
    - entity_id: switch.giot_cn_1116363322_v6oodm_on_p_2_1
      name: "房间1号灯"
      fixed:
        power: 35
    
    - entity_id: switch.giot_cn_1116357483_v6oodm_on_p_2_1
      name: "房间2号灯"
      fixed:
        power: 35
    
    - entity_id: switch.giot_cn_1116363360_v6oodm_on_p_2_1
      name: "房间3号灯"
      fixed:
        power: 35
    
    - entity_id: switch.giot_cn_1116373212_v6oodm_on_p_2_1
      name: "WiFi插座4"
      fixed:
        power: 35
    
    # 双USB插座
    - entity_id: switch.huca_cn_1103518825_dh2_on_p_3_1
      name: "筒灯Left"
      fixed:
        power: 10
    
    - entity_id: switch.huca_cn_1103518825_dh2_on_p_2_1
      name: "筒灯Right"
      fixed:
        power: 10
    
    # 飞利浦灯带（可变功率）
    - entity_id: light.philips_strip3_12ad_light
      name: "氛围灯"
      linear:
        min_power: 2
        max_power: 15
    
    # 户外电源
    - entity_id: switch.de_2dian_yuan_ac_enabled
      name: "户外电源AC"
      fixed:
        power: 100
    
    - entity_id: switch.de_2dian_yuan_usb_enabled
      name: "户外电源USB"
      fixed:
        power: 15

