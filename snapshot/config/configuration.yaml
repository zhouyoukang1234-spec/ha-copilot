# ==================== Intent Script 语音意图处理 ====================
intent_script:
  # ========== MacroDroid 手机控制 (MQTT 方式) ==========
  # 使用公共 MQTT: broker.emqx.io
  # Topic 格式: ha/phone/command
  # 手机端 Tasker/MacroDroid 订阅此 Topic 接收命令
  
  OpenWechat:
    speech:
      text: "好的，正在打开微信"
    action:
      - service: mqtt.publish
        data:
          topic: "ha/phone/command"
          payload: "open_wechat"

  OpenAlipay:
    speech:
      text: "好的，正在打开支付宝"
    action:
      - service: mqtt.publish
        data:
          topic: "ha/phone/command"
          payload: "open_alipay"

  OpenTaobao:
    speech:
      text: "好的，正在打开淘宝"
    action:
      - service: mqtt.publish
        data:
          topic: "ha/phone/command"
          payload: "open_taobao"

  OpenDoubao:
    speech:
      text: "好的，正在打开豆包"
    action:
      - service: mqtt.publish
        data:
          topic: "ha/phone/command"
          payload: "open_doubao"

  OpenAmap:
    speech:
      text: "好的，正在打开高德地图"
    action:
      - service: mqtt.publish
        data:
          topic: "ha/phone/command"
          payload: "open_amap"

  OpenMijia:
    speech:
      text: "好的，正在打开米家"
    action:
      - service: mqtt.publish
        data:
          topic: "ha/phone/command"
          payload: "open_mijia"

  SetMute:
    speech:
      text: "好的，已开启静音模式"
    action:
      - service: mqtt.publish
        data:
          topic: "ha/phone/command"
          payload: "mute"

  DoVibrate:
    speech:
      text: "好的，已震动提醒"
    action:
      - service: mqtt.publish
        data:
          topic: "ha/phone/command"
          payload: "vibrate"

  # ========== 灯光控制 ==========
  # 注意：灯光控制已迁移到 packages/macrodroid_mqtt.yaml
  # 使用 platform: conversation 自动化实现（最快方式）
  # 此处不再定义灯光 intent_script

  # ========== 风扇控制 ==========
  TurnOnFan:
    speech:
      text: "好的，风扇已打开"
    action:
      - service: fan.turn_on
        target:
          entity_id: fan.dmaker_p221_5b47_fan

  TurnOffFan:
    speech:
      text: "好的，风扇已关闭"
    action:
      - service: fan.turn_off
        target:
          entity_id: fan.dmaker_p221_5b47_fan

  # ========== 音箱控制 ==========
  WakeUpSpeaker:
    speech:
      text: "正在唤醒小爱"
    action:
      - service: button.press
        target:
          entity_id: button.xiaomi_cn_795748340_lx06_wake_up_a_5_3

  StopAllSpeakers:
    speech:
      text: "好的，已停止播放"
    action:
      - service: script.stop_all_speakers

  PlayMusic:
    speech:
      text: "好的，开始播放音乐"
    action:
      - service: button.press
        target:
          entity_id: button.xiaomi_cn_795748340_lx06_play_music_a_5_2

  PauseMusic:
    speech:
      text: "好的，已暂停"
    action:
      - service: script.pause_all_speakers

  NextTrack:
    speech:
      text: "好的，下一首"
    action:
      - service: script.sync_next_track_all_speakers

  PreviousTrack:
    speech:
      text: "好的，上一首"
    action:
      - service: script.sync_previous_track_all_speakers

  VolumeUp:
    speech:
      text: "好的，音量已调大"
    action:
      - service: media_player.volume_up
        target:
          entity_id: media_player.xiaomi_lx06_6dfd_play_control

  VolumeDown:
    speech:
      text: "好的，音量已调小"
    action:
      - service: media_player.volume_down
        target:
          entity_id: media_player.xiaomi_lx06_6dfd_play_control

  # ========== 场景模式 ==========
  SleepMode:
    speech:
      text: "晚安，已开启睡眠模式"
    action:
      - service: switch.turn_off
        target:
          entity_id:
            - switch.sonoff_10022ddc35_1
            - switch.sonoff_10022de63b_1
            - switch.huca_cn_1103518825_dh2_on_p_2_1
            - switch.huca_cn_1103518825_dh2_on_p_3_1
      - service: light.turn_off
        target:
          entity_id: light.philips_strip3_12ad_light
      - service: switch.turn_on
        target:
          entity_id: switch.giot_cn_1116373212_v6oodm_on_p_2_1

  WakeUpMode:
    speech:
      text: "早安，已开启起床模式"
    action:
      - service: switch.turn_on
        target:
          entity_id:
            - switch.sonoff_10022ddc35_1
            - switch.sonoff_10022de63b_1
      - service: switch.turn_off
        target:
          entity_id: switch.giot_cn_1116373212_v6oodm_on_p_2_1

  LeaveHome:
    speech:
      text: "再见，已开启离家模式"
    action:
      - service: switch.turn_off
        target:
          entity_id:
            - switch.sonoff_10022ddc35_1
            - switch.sonoff_10022de63b_1
            - switch.huca_cn_1103518825_dh2_on_p_2_1
            - switch.huca_cn_1103518825_dh2_on_p_3_1
            - switch.giot_cn_1116373212_v6oodm_on_p_2_1
      - service: light.turn_off
        target:
          entity_id: light.philips_strip3_12ad_light
      - service: fan.turn_off
        target:
          entity_id: fan.dmaker_p221_5b47_fan

  BackHome:
    speech:
      text: "欢迎回家"
    action:
      - service: switch.turn_on
        target:
          entity_id:
            - switch.sonoff_10022ddc35_1
            - switch.sonoff_10022de63b_1


