# 移动端UI场景配置

# 回家场景
- name: 回家模式
  icon: mdi:home-import-outline
  entities:
    switch.sonoff_10022dede9_1: on
    switch.sonoff_10022dedc7_1: on
    light.philips_strip3_12ad_light:
      state: on
      brightness: 180
      color_temp: 370

# 离家场景  
- name: 离家模式
  icon: mdi:home-export-outline
  entities:
    switch.sonoff_10022dede9_1: off
    switch.sonoff_10022dedc7_1: off
    light.philips_strip3_12ad_light: off
    fan.dmaker_p221_5b47_fan: off
    switch.xiaomi_x08e_8219_switch_status: off

