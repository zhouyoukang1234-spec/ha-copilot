# ==================== LED灯光脚本配置完成 ====================
# 灯带模式：led_breathing_mode, led_rainbow_cycle, led_blink_mode, led_gradient_mode
# LED跟随：led_follow_strip（LED自动跟随灯带颜色）
# 停止效果：led_stop_strip_effects（停止所有灯带效果并恢复默认）
# 状态刷新：led_refresh_status（同步外部软件的修改）
# 🎵 灯光律动控制脚本
# 8个灯光的节奏闪烁效果

# 律动模式1：波浪效果
light_rhythm_wave:
  alias: "灯光律动 - 波浪"
  icon: mdi:waves
  mode: restart
  sequence:
    - repeat:
        count: 6
        sequence:
          # 第1波：1号、2号、3号
          - service: switch.turn_on
            target:
              entity_id:
                - switch.giot_cn_1116363322_v6oodm_on_p_2_1  # 房间1号灯
                - switch.giot_cn_1116357483_v6oodm_on_p_2_1  # 房间2号灯
                - switch.giot_cn_1116363360_v6oodm_on_p_2_1  # 房间3号灯
          - delay:
              milliseconds: 600
          
          - service: switch.turn_off
            target:
              entity_id:
                - switch.giot_cn_1116363322_v6oodm_on_p_2_1
                - switch.giot_cn_1116357483_v6oodm_on_p_2_1
                - switch.giot_cn_1116363360_v6oodm_on_p_2_1
          
          # 第2波：4号、5号、0.1号
          - service: switch.turn_on
            target:
              entity_id:
                - switch.sonoff_10022dede9_1  # 房间4号灯
                - switch.sonoff_10022dedc7_1  # 房间5号灯
                - switch.giot_cn_1116373212_v6oodm_on_p_2_1  # 0.1号灯(WiFi插座4)
          - delay:
              milliseconds: 600
          
          - service: switch.turn_off
            target:
              entity_id:
                - switch.sonoff_10022dede9_1
                - switch.sonoff_10022dedc7_1
                - switch.giot_cn_1116373212_v6oodm_on_p_2_1
          
          # 第3波：顶灯、床底灯
          - service: switch.turn_on
            target:
              entity_id:
                - switch.sonoff_10022ddc35_1  # 顶灯1号
                - switch.sonoff_10022de63b_1  # 顶灯2号
          - service: light.turn_on
            target:
              entity_id: light.philips_strip3_12ad_light  # 床底灯(氛围灯)
            data:
              brightness: 255
          - delay:
              milliseconds: 450
          
          - service: switch.turn_off
            target:
              entity_id:
                - switch.sonoff_10022ddc35_1
                - switch.sonoff_10022de63b_1
          - service: light.turn_off
            target:
              entity_id: light.philips_strip3_12ad_light
          
          - delay:
              milliseconds: 300

# 律动模式2：闪烁效果
light_rhythm_flash:
  alias: "灯光律动 - 闪烁"
  icon: mdi:flash
  mode: restart
  sequence:
    - repeat:
        count: 12
        sequence:
          # 所有灯同时开
          - service: switch.turn_on
            target:
              entity_id:
                - switch.giot_cn_1116363322_v6oodm_on_p_2_1  # 1号
                - switch.giot_cn_1116357483_v6oodm_on_p_2_1  # 2号
                - switch.giot_cn_1116363360_v6oodm_on_p_2_1  # 3号
                - switch.sonoff_10022dede9_1                 # 4号
                - switch.sonoff_10022dedc7_1                 # 5号
                - switch.giot_cn_1116373212_v6oodm_on_p_2_1  # 0.1号
                - switch.sonoff_10022ddc35_1                 # 顶灯1
                - switch.sonoff_10022de63b_1                 # 顶灯2
          - service: light.turn_on
            target:
              entity_id: light.philips_strip3_12ad_light
            data:
              brightness: 255
          
          - delay:
              milliseconds: 400
          
          # 所有灯同时关
          - service: switch.turn_off
            target:
              entity_id:
                - switch.giot_cn_1116363322_v6oodm_on_p_2_1
                - switch.giot_cn_1116357483_v6oodm_on_p_2_1
                - switch.giot_cn_1116363360_v6oodm_on_p_2_1
                - switch.sonoff_10022dede9_1
                - switch.sonoff_10022dedc7_1
                - switch.giot_cn_1116373212_v6oodm_on_p_2_1
                - switch.sonoff_10022ddc35_1
                - switch.sonoff_10022de63b_1
          - service: light.turn_off
            target:
              entity_id: light.philips_strip3_12ad_light
          
          - delay:
              milliseconds: 400

# 律动模式3：呼吸效果（适用于可调光的灯）
light_rhythm_breathe:
  alias: "灯光律动 - 呼吸"
  icon: mdi:weather-windy
  mode: restart
