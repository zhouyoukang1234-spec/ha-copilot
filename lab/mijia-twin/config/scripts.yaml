# LED亮度渐变跟随灯带（亮度错位+颜色偏移）
led_follow_strip_gradient:
  alias: LED渐变跟随
  icon: mdi:gradient-vertical
  mode: restart
  sequence:
    - repeat:
        count: 200
        sequence:
          # 获取灯带状态
          - variables:
              strip_brightness: "{{ state_attr('light.philips_strip3_12ad_light', 'brightness') | int(200) }}"
              strip_r: "{{ state_attr('light.philips_strip3_12ad_light', 'rgb_color')[0] | int }}"
              strip_g: "{{ state_attr('light.philips_strip3_12ad_light', 'rgb_color')[1] | int }}"
              strip_b: "{{ state_attr('light.philips_strip3_12ad_light', 'rgb_color')[2] | int }}"
          # LED 2: 100%亮度，原色
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_2
            data:
              brightness: "{{ strip_brightness }}"
              rgb_color: ["{{ strip_r }}", "{{ strip_g }}", "{{ strip_b }}"]
              transition: 1
          # LED 3: 85%亮度，偏暖
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_3
            data:
              brightness: "{{ (strip_brightness * 0.90) | int }}"
              rgb_color: ["{{ ([strip_r + 20, 255] | min) }}", "{{ ([strip_g + 10, 255] | min) }}", "{{ strip_b }}"]
              transition: 1
          # LED 4: 70%亮度，偏冷
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_4
            data:
              brightness: "{{ (strip_brightness * 0.75) | int }}"
              rgb_color: ["{{ strip_r }}", "{{ ([strip_g + 15, 255] | min) }}", "{{ ([strip_b + 20, 255] | min) }}"]
              transition: 1
          # LED 5: 55%亮度，偏绿
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_5
            data:
              brightness: "{{ (strip_brightness * 0.60) | int }}"
              rgb_color: ["{{ ([strip_r - 10, 0] | max) }}", "{{ ([strip_g + 25, 255] | min) }}", "{{ strip_b }}"]
              transition: 1
          # LED 6: 40%亮度，偏紫
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_6
            data:
              brightness: "{{ (strip_brightness * 0.45) | int }}"
              rgb_color: ["{{ ([strip_r + 15, 255] | min) }}", "{{ strip_g }}", "{{ ([strip_b + 25, 255] | min) }}"]
              transition: 1
          # LED 7: 25%亮度，偏蓝
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_7
            data:
              brightness: "{{ (strip_brightness * 0.30) | int }}"
              rgb_color: ["{{ ([strip_r - 20, 0] | max) }}", "{{ strip_g }}", "{{ ([strip_b + 30, 255] | min) }}"]
              transition: 1
          - delay:
              milliseconds: 1000

# LED颜色偏移跟随灯带（彩虹错位）- 6个LED显示完全不同颜色
led_follow_strip_rainbow:
