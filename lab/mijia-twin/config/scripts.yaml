  icon: mdi:palette-advanced
  mode: restart
  sequence:
    - repeat:
        count: 200
        sequence:
          # 获取灯带亮度，但每个LED显示完全不同的颜色
          - variables:
              strip_brightness: "{{ state_attr('light.philips_strip3_12ad_light', 'brightness') | int(200) }}"
