# ==================== MacroDroid 手机本地命令测试 ====================

# 测试 command_webview - 让手机访问自己的 localhost
test_macrodroid_webview:
  alias: "测试MacroDroid-WebView"
  description: "通过 command_webview 让手机访问自己的 localhost MacroDroid"
  icon: mdi:cellphone-link
  fields:
    cmd:
      description: "要执行的命令"
      example: "open_wechat"
  sequence:
    - service: notify.mobile_app_one_plus
      data:
        message: "command_webview"
        data:
          url: "http://127.0.0.1:8080/{ha}?cmd={{ cmd | default('open_wechat') }}"
  mode: single

# 测试 command_broadcast_intent - 直接触发 MacroDroid
test_macrodroid_broadcast:
  alias: "测试MacroDroid-Broadcast"
  description: "通过 Broadcast Intent 直接触发 MacroDroid"
  icon: mdi:broadcast
  fields:
    trigger_name:
      description: "MacroDroid 触发器名称"
      example: "open_wechat"
  sequence:
    - service: notify.mobile_app_one_plus
      data:
        message: "command_broadcast_intent"
        data:
          intent_action: "com.arlosoft.macrodroid.action.FIRE_TRIGGER"
          intent_extras:
            trigger_name: "{{ trigger_name | default('open_wechat') }}"
  mode: single

# 直接打开微信（不需要 MacroDroid）
test_open_wechat_direct:
  alias: "直接打开微信"
  description: "通过 command_activity 直接启动微信"
  icon: mdi:wechat
  sequence:
    - service: notify.mobile_app_one_plus
      data:
        message: "command_activity"
        data:
          intent_action: "android.intent.action.MAIN"
          intent_package_name: "com.tencent.mm"
  mode: single

