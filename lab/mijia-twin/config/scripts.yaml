          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_2
            data:
              brightness: "{{ strip_brightness }}"
              rgb_color: [255, 0, 0]
              transition: 0.5
          # LED 3: 橙色
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_3
            data:
              brightness: "{{ strip_brightness }}"
              rgb_color: [255, 127, 0]
              transition: 0.5
          # LED 4: 黄色
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_4
            data:
              brightness: "{{ strip_brightness }}"
              rgb_color: [255, 255, 0]
              transition: 0.5
          # LED 5: 绿色
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_5
            data:
              brightness: "{{ strip_brightness }}"
              rgb_color: [0, 255, 0]
              transition: 0.5
          # LED 6: 青色
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_6
            data:
              brightness: "{{ strip_brightness }}"
              rgb_color: [0, 255, 255]
              transition: 0.5
          # LED 7: 蓝色
          - service: light.turn_on
            target:
              entity_id: light.b650m_aorus_elite_ax_0_led_7
            data:
              brightness: "{{ strip_brightness }}"
              rgb_color: [0, 0, 255]
              transition: 0.5
          - delay:
              milliseconds: 500

