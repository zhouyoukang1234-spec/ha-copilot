# 停止律动（立即强制停止所有律动脚本）
light_rhythm_stop:
  alias: "停止灯光律动"
  icon: mdi:stop
  mode: restart  # 关键：允许强制终止其他脚本
  sequence:
    # 先停止所有可能运行的律动脚本
    - service: script.turn_off
      target:
        entity_id:
          - script.light_rhythm_wave
          - script.light_rhythm_flash
          - script.light_rhythm_breathe
          - script.light_rhythm_alternate
          - script.light_rhythm_chase
          - script.light_rhythm_random
    
    # 延迟一下确保脚本停止
    - delay:
        milliseconds: 200
    
    # 关闭所有灯光
    - service: switch.turn_off
      target:
        entity_id:
          - switch.giot_cn_1116363322_v6oodm_on_p_2_1
          - switch.giot_cn_1116357483_v6oodm_on_p_2_1
          - switch.giot_cn_1116363360_v6oodm_on_p_2_1
