# 工作模式脚本
work_mode:
  alias: 工作模式
  description: 工作时的最佳环境设置
  icon: mdi:laptop
  sequence:
    # 开启主照明
    - service: switch.turn_on
      target:
        entity_id: switch.sonoff_10022dede9_1
    
    # 设置氛围灯为白光（提高专注度）
    - service: light.turn_on
      target:
        entity_id: light.philips_strip3_12ad_light
      data:
        brightness: 255
        color_temp: 250  # 冷白光
    
    # 开启插座（电脑设备）
    - service: switch.turn_on
      target:
        entity_id: switch.sonoff_10022dedc7_1
    
    # 调整风扇为适中档位
    - service: fan.turn_on
      target:
        entity_id: fan.dmaker_p221_5b47_fan
      data:
        speed: 3
    
    # 发送通知
    - service: notify.persistent_notification
      data:
        title: "💼 工作模式"
        message: "工作环境已就绪，专注工作吧！"

# 娱乐模式脚本
entertainment_mode:
  alias: 娱乐模式
  description: 观影或娱乐时的环境设置
  icon: mdi:movie-open
  sequence:
    # 关闭主照明
    - service: switch.turn_off
      target:
        entity_id: switch.sonoff_10022dede9_1
    
    # 设置氛围灯为彩色模式
    - service: light.turn_on
      target:
        entity_id: light.philips_strip3_12ad_light
      data:
        brightness: 120
        rgb_color: [138, 43, 226]  # 紫色
        effect: "colorloop"
    
    # 调整风扇为静音模式
    - service: fan.turn_on
      target:
        entity_id: fan.dmaker_p221_5b47_fan
      data:
        speed: 1
    
    # 发送通知
    - service: notify.persistent_notification
      data:
        title: "🎬 娱乐模式"
        message: "享受您的娱乐时光！"

# 清洁模式脚本
cleaning_mode:
  alias: 清洁模式
  description: 打扫时的环境设置
  icon: mdi:broom
  sequence:
    # 开启所有照明
    - service: switch.turn_on
      target:
        entity_id: switch.sonoff_10022dede9_1
    
    # 设置氛围灯为明亮白光
    - service: light.turn_on
      target:
        entity_id: light.philips_strip3_12ad_light
      data:
        brightness: 255
        color_temp: 200  # 非常冷的白光
    
    # 开启风扇最大档位（通风）
    - service: fan.turn_on
      target:
        entity_id: fan.dmaker_p221_5b47_fan
      data:
        speed: 4
    
    # 发送通知
    - service: notify.persistent_notification
      data:
        title: "🧹 清洁模式"
        message: "清洁环境已设置，开始打扫吧！"

# 紧急模式脚本
emergency_mode:
  alias: 紧急模式
  description: 紧急情况下的设置
  icon: mdi:alert
  sequence:
    # 开启所有照明
    - service: switch.turn_on
      target:
        entity_id: 
          - switch.sonoff_10022dede9_1
          - switch.sonoff_10022dedc7_1
    
    # 设置氛围灯为红色闪烁
    - service: light.turn_on
      target:
        entity_id: light.philips_strip3_12ad_light
      data:
        brightness: 255
        rgb_color: [255, 0, 0]  # 红色
        effect: "colorloop"
    
    # 关闭风扇
    - service: fan.turn_off
      target:
        entity_id: fan.dmaker_p221_5b47_fan
    
    # 发送紧急通知
    - service: notify.persistent_notification
      data:
        title: "🚨 紧急模式"
        message: "紧急模式已激活！"

# 节能模式脚本
energy_saving_mode:
  alias: 节能模式
  description: 最大化节能的设置
  icon: mdi:leaf
  sequence:
    # 关闭不必要的照明
    - service: switch.turn_off
      target:
        entity_id: switch.sonoff_10022dede9_1
    
    # 设置氛围灯为最低亮度
    - service: light.turn_on
      target:
        entity_id: light.philips_strip3_12ad_light
      data:
        brightness: 50
        color_temp: 400  # 暖光更节能
    
    # 关闭插座
    - service: switch.turn_off
      target:
        entity_id: switch.sonoff_10022dedc7_1
    
    # 关闭风扇
    - service: fan.turn_off
      target:
        entity_id: fan.dmaker_p221_5b47_fan
    
    # 发送通知
    - service: notify.persistent_notification
      data:
        title: "🌱 节能模式"
        message: "已启用节能模式，为环保贡献力量！"

# 早餐模式脚本
breakfast_mode:
  alias: 早餐模式
  description: 早餐时间的舒适环境
  icon: mdi:coffee
  sequence:
    # 开启主照明（明亮）
    - service: switch.turn_on
      target:
        entity_id: switch.sonoff_10022dede9_1
    
    # 设置氛围灯为暖白光
    - service: light.turn_on
      target:
        entity_id: light.philips_strip3_12ad_light
      data:
        brightness: 200
        color_temp: 350
    
    # 开启风扇（轻柔）
    - service: fan.turn_on
      target:
        entity_id: fan.dmaker_p221_5b47_fan
      data:
        speed: 1
    
    # 发送通知
    - service: notify.persistent_notification
      data:
        title: "☕ 早餐模式"
        message: "早安！舒适的早餐环境已准备好"

# 午休模式脚本
lunch_break_mode:
  alias: 午休模式
  description: 午休时间的放松环境
  icon: mdi:weather-sunny
  sequence:
    # 调暗主照明
    - service: switch.turn_off
      target:
        entity_id: switch.sonoff_10022dede9_1
    
    # 设置氛围灯为柔和光
    - service: light.turn_on
      target:
        entity_id: light.philips_strip3_12ad_light
      data:
        brightness: 100
        rgb_color: [255, 200, 150]
    
    # 调整风扇为舒适档
    - service: fan.turn_on
      target:
        entity_id: fan.dmaker_p221_5b47_fan
      data:
        speed: 2
    
    # 发送通知
    - service: notify.persistent_notification
      data:
        title: "🌤️ 午休模式"
        message: "午休时间，放松一下吧！"

# 晚餐模式脚本
dinner_mode:
  alias: 晚餐模式
  description: 晚餐时间的温馨氛围
  icon: mdi:silverware-fork-knife
  sequence:
    # 开启主照明
    - service: switch.turn_on
      target:
        entity_id: switch.sonoff_10022dede9_1
    
    # 设置氛围灯为温馨暖光
    - service: light.turn_on
      target:
        entity_id: light.philips_strip3_12ad_light
      data:
        brightness: 180
        rgb_color: [255, 180, 100]
    
    # 关闭风扇（安静用餐）
    - service: fan.turn_off
      target:
        entity_id: fan.dmaker_p221_5b47_fan
    
    # 发送通知
    - service: notify.persistent_notification
      data:
        title: "🍽️ 晚餐模式"
        message: "晚餐时间到！温馨的用餐环境已就绪"

# 注意：TTS播报脚本(tts_broadcast_all_speakers)已移至packages/speaker_tts.yaml

# 多音响同步播放脚本
play_music_all_speakers:
  alias: "多音响同步播放"
  description: "让所有小米音响同时播放相同的音乐指令"
  icon: mdi:speaker-multiple
  fields:
    text:
      description: "要播放的音乐指令"
      example: "播放流行音乐"
  sequence:
    # 向小米音箱Pro发送指令
    - service: xiaomi_miot.intelligent_speaker
      data:
        entity_id: media_player.xiaomi_lx06_6dfd_play_control
        text: "{{ text }}"
        execute: true
    
    # 延迟200毫秒
    - delay:
        milliseconds: 200
    
    # 向小爱触屏音箱发送指令
    - service: xiaomi_miot.intelligent_speaker
      data:
        entity_id: media_player.xiaomi_lx04_12e4_play_control_2
        text: "{{ text }}"
        execute: true
    
    # 延迟200毫秒
    - delay:
        milliseconds: 200
    
    # 向Sound音箱发送指令
    - service: xiaomi_miot.intelligent_speaker
      data:
        entity_id: media_player.xiaomi_l16a_0be7_play_control
        text: "{{ text }}"
        execute: true
    
    # 延迟200毫秒
    - delay:
        milliseconds: 200
    
    # 向红米音箱发送指令
    - service: xiaomi_miot.intelligent_speaker
      data:
        entity_id: media_player.xiaomi_x08e_8219_play_control
        text: "{{ text }}"
        execute: true
    
    # 发送通知
    - service: persistent_notification.create
      data:
        title: "🎵 多音响同步"
        message: "已向4个音响同时发送指令：{{ text }}"
  mode: single

# 停止所有音响
stop_all_speakers:
  alias: "停止所有音响"
  description: "同时停止所有小米音响的播放"
  icon: mdi:stop-circle
  sequence:
    - service: media_player.media_stop
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
  mode: single

# 暂停所有音响
pause_all_speakers:
  alias: "暂停所有音响"
  description: "同时暂停所有小米音响的播放"
  icon: mdi:pause-circle
  sequence:
    - service: media_player.media_pause
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
  mode: single

# 继续播放所有音响
play_all_speakers:
  alias: "继续播放所有音响"
  description: "同时继续播放所有小米音响"
  icon: mdi:play-circle
  sequence:
    - service: media_player.media_play
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
  mode: single

# 统一音量设置
set_all_speakers_volume:
  alias: "统一音量设置"
  description: "将所有音响设置为相同音量"
  icon: mdi:volume-high
  fields:
    volume_level:
      description: "音量等级 (0.0-1.0)"
      example: 0.5
  sequence:
    - service: media_player.volume_set
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
      data:
        volume_level: "{{ volume_level }}"
  mode: single

# ==================== 娱乐页面Scripts (自动添加) ====================

# 发送到4个音箱 - 最简单版本
send_to_4_speakers:
  alias: 发送到4个音箱
  description: 读取输入框内容并同时发送到4个音箱
  icon: mdi:send-circle
  sequence:
    - service: text.set_value
      target:
        entity_id:
          - text.xiaomi_lx06_6dfd_execute_text_directive
          - text.xiaomi_lx04_12e4_execute_text_directive_2
          - text.xiaomi_l16a_0be7_execute_text_directive
          - text.xiaomi_x08e_8219_execute_text_directive
      data:
        value: "{{ states('input_text.unified_speaker_command') }}"
  mode: single

# 统一发送指令到4个音箱
send_unified_command:
  alias: 发送统一指令到4个音箱
  description: 同时向4个小米音箱发送相同的语音命令
  icon: mdi:send-circle
  sequence:
    - service: text.set_value
      target:
        entity_id:
          - text.xiaomi_lx06_6dfd_execute_text_directive
          - text.xiaomi_lx04_12e4_execute_text_directive_2
          - text.xiaomi_l16a_0be7_execute_text_directive
          - text.xiaomi_x08e_8219_execute_text_directive
      data:
        value: "{{ states('input_text.unified_speaker_command') }}"
    - service: persistent_notification.create
      data:
        title: "📢 指令已发送"
        message: "已向4个音箱发送指令: {{ states('input_text.unified_speaker_command') }}"
        notification_id: unified_speaker_command
  mode: single

send_command_to_all_speakers:
  alias: 向所有音箱发送命令
  description: 同时向5个小米音箱发送相同的语音命令
  sequence:
    - variables:
        cmd_text: >
          {% if command is defined %}
            {{ command }}
          {% else %}
            {{ states('input_text.unified_speaker_command') }}
          {% endif %}
    - service: xiaomi_miot.intelligent_speaker
      data:
        entity_id: media_player.xiaomi_lx06_6dfd_play_control
        text: "{{ cmd_text }}"
        execute: true
    - delay:
        milliseconds: 200
    - service: xiaomi_miot.intelligent_speaker
      data:
        entity_id: media_player.xiaomi_lx04_12e4_play_control_2
        text: "{{ cmd_text }}"
        execute: true
    - delay:
        milliseconds: 200
    - service: xiaomi_miot.intelligent_speaker
      data:
        entity_id: media_player.xiaomi_l16a_0be7_play_control
        text: "{{ cmd_text }}"
        execute: true
    - delay:
        milliseconds: 200
    - service: xiaomi_miot.intelligent_speaker
      data:
        entity_id: media_player.xiaomi_x08e_8219_play_control
        text: "{{ cmd_text }}"
        execute: true
    - delay:
        milliseconds: 200
    - service: xiaomi_miot.intelligent_speaker
      data:
        entity_id: media_player.xiaomi_lx06_72f9_play_control
        text: "{{ cmd_text }}"
        execute: true
    - service: persistent_notification.create
      data:
        title: "📢 命令已发送"
        message: "已向5个音箱发送命令: {{ cmd_text }}"
        notification_id: speaker_command
    - service: input_text.set_value
      data:
        entity_id: input_text.unified_speaker_command
        value: ""

# ==================== 同步播放控制脚本（强化版） ====================

# 同步播放所有音箱（优化版）
sync_play_all_speakers:
  alias: 同步播放所有音箱
  description: 快速同步，暂停→短暂等待→连续播放命令
  icon: mdi:play-circle
  sequence:
    # 暂停所有音箱
    - service: media_player.media_pause
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
    # 短暂等待确保暂停完成
    - delay:
        milliseconds: 800
    # 连续发送3次播放命令（无延迟）
    - service: media_player.media_play
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
    - service: media_player.media_play
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
    - service: media_player.media_play
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
  mode: restart

# 同步暂停所有音箱
sync_pause_all_speakers:
  alias: 同步暂停所有音箱
  description: 多次暂停确保所有音箱都停止
  icon: mdi:pause-circle
  sequence:
    # 第1次暂停
    - service: media_player.media_pause
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
    # 等待0.3秒
    - delay:
        milliseconds: 300
    # 第2次暂停
    - service: media_player.media_pause
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
  mode: single

# 同步下一首（优化版）
sync_next_track_all_speakers:
  alias: 同步下一首
  description: 快速切歌，暂停→切歌→立即播放
  icon: mdi:skip-next-circle
  sequence:
    # 暂停所有音箱
    - service: media_player.media_pause
      target:
