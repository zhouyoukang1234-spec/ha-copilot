# 移动端UI脚本配置

# 回家模式脚本
home_mode:
  alias: 回家模式
  description: 回家时自动执行的场景
  icon: mdi:home-import-outline
  sequence:
    # 开启主要照明
    - service: switch.turn_on
      target:
        entity_id: switch.sonoff_10022dede9_1
    
    # 开启氛围灯带（暖白光）
    - service: light.turn_on
      target:
        entity_id: light.philips_strip3_12ad_light
      data:
        brightness: 180
        color_temp: 370
    
    # 开启插座（如果有连接设备）
    - service: switch.turn_on
      target:
        entity_id: switch.sonoff_10022dedc7_1
    
    # 启动风扇（如果需要）
    - service: fan.turn_on
      target:
        entity_id: fan.dmaker_p221_5b47_fan
      data:
        speed: 2
    
    # 发送通知
    - service: notify.persistent_notification
      data:
        title: "🏠 回家模式"
        message: "欢迎回家！已为您开启舒适模式。"

# 离家模式脚本
away_mode:
  alias: 离家模式
  description: 离家时自动执行的场景
  icon: mdi:home-export-outline
  sequence:
    # 关闭所有照明
    - service: switch.turn_off
      target:
        entity_id: 
          - switch.sonoff_10022dede9_1
          - switch.sonoff_10022dedc7_1
    
    # 关闭氛围灯带
    - service: light.turn_off
      target:
        entity_id: light.philips_strip3_12ad_light
    
    # 关闭风扇
    - service: fan.turn_off
      target:
        entity_id: fan.dmaker_p221_5b47_fan
    
    # 关闭其他可控设备
    - service: switch.turn_off
      target:
        entity_id: switch.xiaomi_x08e_8219_switch_status
    
    # 发送通知
    - service: notify.persistent_notification
      data:
        title: "🚪 离家模式"
        message: "已关闭所有设备，祝您出行愉快！"

