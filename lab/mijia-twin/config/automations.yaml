# ==================== 双音响联动自动化 ====================

# 统一指令一传二（参考一传四实现）
- action:
  - data:
      entity_id:
      - text.xiaomi_lx06_6dfd_execute_text_directive
      - text.xiaomi_l16a_0be7_execute_text_directive
      value: '{{ states(''input_text.dual_speakers_command'') }}'
    service: text.set_value
  - delay:
      milliseconds: 100
  - data:
      entity_id: input_text.dual_speakers_command
      value: ''
    service: input_text.set_value
  alias: 统一指令一传二
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state != "" and trigger.to_state.state !=
      trigger.from_state.state }}'
  description: 当统一指令输入框有内容时，自动同时发送到小米音响Pro和Sound音响并清空输入框
  id: unified_command_to_2_speakers_auto
  mode: queued
  max: 5
  trigger:
  - entity_id: input_text.dual_speakers_command
    platform: state

