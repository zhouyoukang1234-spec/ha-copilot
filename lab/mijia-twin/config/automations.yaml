# ==================== 文字输入语音输出自动化 ====================
# 当语音助手对话框收到文字回复时，自动调用 TTS 朗读到 ESPHome 设备
- alias: 语音助手文字回复朗读
  description: 监听 assist_pipeline 的响应事件，把文字回复通过 TTS 朗读出来
  id: 'assist_text_to_speech_1766427902989'
  mode: queued
  max: 5
  triggers:
    - trigger: event
      event_type: assist_pipeline_run_end
  conditions: []
  actions:
    # 先记录日志确认触发
    - action: system_log.write
      data:
        message: "Assist pipeline event received: {{ trigger.event.data | tojson }}"
        level: info
    # 调用 TTS
    - action: tts.edge_tts_say
      data:
        entity_id: media_player.sm_n9860_6a5c_voice_assistant_mei_ti_bo_fang_qi
        message: "{{ trigger.event.data.intent_output.response.speech.plain.speech | default('测试语音') }}"
      continue_on_error: true




