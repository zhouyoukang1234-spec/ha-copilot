# ==================== 音箱统一播放控制自动化（强化版 - 多次重试确保同步） ====================
- alias: 统一播放所有音箱（强化版）
  description: 多次暂停统一状态，多次播放确保完美同步
  id: 'unified_speaker_play_sync_1732897000001'
  mode: single
  triggers:
    - entity_id: input_boolean.unified_speaker_play
      to: 'on'
      trigger: state
  actions:
    # 步骤1: 第一次暂停所有音箱
    - action: media_player.media_pause
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
    # 步骤2: 等待0.5秒
    - delay:
        milliseconds: 500
    # 步骤3: 第二次暂停（确保慢音箱也停止）
    - action: media_player.media_pause
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
    # 步骤4: 等待2秒，确保所有音箱完全停止
    - delay:
        seconds: 2
    # 步骤5: 第一次播放命令
    - action: media_player.media_play
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
    # 步骤6: 等待0.5秒
    - delay:
        milliseconds: 500
    # 步骤7: 第二次播放（重试慢音箱）
    - action: media_player.media_play
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
          - media_player.xiaomi_l16a_0be7_play_control
          - media_player.xiaomi_x08e_8219_play_control
          - media_player.xiaomi_lx06_72f9_play_control
    # 步骤8: 等待0.8秒
    - delay:
        milliseconds: 800
    # 步骤9: 第三次播放（最后确认）
    - action: media_player.media_play
      target:
        entity_id:
          - media_player.xiaomi_lx06_6dfd_play_control
          - media_player.xiaomi_lx04_12e4_play_control_2
