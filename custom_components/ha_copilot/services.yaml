run_tool:
  name: Run tool
  description: Invoke any HA-Copilot tool by name (generic dispatcher).
  fields:
    tool:
      name: Tool name
      description: The tool to invoke (e.g. 'list_entities', 'search_zigbee_devices').
      required: true
      selector:
        text:
    args:
      name: Arguments
      description: Tool arguments as a dictionary.
      required: false
      selector:
        object:

discover_resources:
  name: Discover resources
  description: >-
    One free-text query, all 9 sources at once (HACS, GitHub, blueprints,
    Zigbee, Z-Wave, Tasmota, ESPHome, native integrations, add-ons).
    Returns per-source results plus a fused top list.
  fields:
    query:
      name: Query
      description: "Brand, device, or need (e.g. 'xiaomi vacuum', 'low battery notification')."
      required: true
      selector:
        text:
    limit:
      name: Limit
      description: Max results per source.
      default: 8
      selector:
        number:
          min: 1
          max: 50

search_hacs:
  name: Search HACS
  description: Search the HACS catalog (integrations, cards, themes).
  fields:
    query:
      name: Query
      required: true
      selector:
        text:
    limit:
      name: Limit
      default: 10
      selector:
        number:
          min: 1
          max: 50

search_github:
  name: Search GitHub
  description: Search GitHub for HA-related repositories by stars.
  fields:
    query:
      name: Query
      required: true
      selector:
        text:
    limit:
      name: Limit
      default: 10
      selector:
        number:
          min: 1
          max: 50

search_blueprints:
  name: Search blueprints
  description: Search community automation/script blueprints.
  fields:
    query:
      name: Query
      required: true
      selector:
        text:
    limit:
      name: Limit
      default: 10
      selector:
        number:
          min: 1
          max: 50

search_zigbee_devices:
  name: Search Zigbee devices
  description: "Search the community Zigbee device database (~2700 devices) for brand/model compatibility."
  fields:
    query:
      name: Query
      description: "Brand or model (e.g. 'aqara motion sensor')."
