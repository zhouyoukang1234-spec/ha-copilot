ask:
  name: Ask HA-Copilot
  description: >-
    Send a natural-language instruction to HA-Copilot. The agent may inspect and
    modify Home Assistant using its tools, and returns a reply plus the trace of
    operations it performed.
  fields:
    message:
      name: Message
      description: The instruction or question for the copilot.
      required: true
      example: "创建一个自动化：每天日落时打开客厅灯"
      selector:
        text:
          multiline: true

run_tool:
  name: Run a copilot tool
  description: >-
    Directly execute one HA-Copilot tool by name, bypassing the LLM. Useful for
    automations/scripts that know exactly which low-level operation they want,
    and for deterministic testing of the tool layer.
  fields:
    tool:
      name: Tool
      description: Tool name, e.g. list_states, call_service, create_area, render_template.
      required: true
      example: render_template
      selector:
        text:
    args:
      name: Arguments
      description: Object of arguments for the tool.
      required: false
      example: '{"template": "{{ states.light | selectattr(''state'',''eq'',''on'') | list | count }}"}'
      selector:
        object:
