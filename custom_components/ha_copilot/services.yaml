recommend_resources:
  name: Recommend resources
  description: >-
    Read the running HA's real devices and recommend matching HACS
    integrations, frontend cards, and automation blueprints.
  fields:
    limit:
      name: Limit
      description: Max recommendations per kind.
      default: 15
      selector:
        number:
          min: 1
          max: 50
    include_blueprints:
      name: Include blueprints
      description: Also include device-matched blueprint recommendations.
      default: true
      selector:
        boolean:

recommend_blueprints:
  name: Recommend blueprints
  description: >-
    Map real entity domains to intents and suggest matching community
    automation blueprints for your devices.
  fields:
    limit:
      name: Limit
      default: 10
      selector:
        number:
          min: 1
          max: 30

resolve_user_intent:
  name: Resolve user intent
  description: >-
    Translate a natural-language need into matched intents with step-by-step
    tool chains and recommended searches. Say WHAT you want, get HOW to do it.
  fields:
    need:
      name: Need
      description: What you want (e.g. "turn on lights when motion detected").
      required: true
      selector:
        text:
    limit:
      name: Limit
      default: 3
      selector:
        number:
          min: 1
          max: 10
